name: Update Trophy Card

on:
  schedule:
    # Runs once daily at midnight UTC
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate trophy card
        uses: soulteary/github-profile-trophy-action@v1.0.0
        with:
          options: "username=JaganKSwain&theme=gruvbox&no-frame=true&no-bg=true&column=7&margin-w=10"
          path: assets/trophy.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit trophy card
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/trophy.svg
          git diff --cached --quiet || (git commit -m "chore: update trophy card" && git push)
